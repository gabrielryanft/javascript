<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <canvas id="screen">

        </canvas>
        <div id='center'>
            <div class="conjunto">
                <label for="range" class="letraLabel" >Largura da linha:</label>
                <input type="range" name="range" id="range" min="1" max="50" value="25">
            </div>
            <div class="conjunto">
                <label for="color" class="letraLabel" >Cor da linha:</label>
                <input type="color" name="color" id="color" value="000">
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
