<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editando imagens</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div>
            <img src="https://source.unsplash.com/random/?id=a" alt="">
        </div>
        <div id="divForm">
            <div class="pRange">
                <p id="filter-blur">blur</p>
                <input type="range" name="" id="" min="0" max="20" value="0">
            </div>

            <div class="pRange">
                <p id="filter-contrast" >contrast</p>
                <input type="range" name="" id="" min="0" max="500" value="100">
            </div>

            <div class="pRange">
                <p id="filter-grayscale" >grayscale</p>
                <input type="range" name="" id="" min="0" max="100" value="0">
            </div>

            <div class="pRange">
                <p id="filter-hue-rotate" >hue-rotate</p>
                <input type="range" name="" id="" min="0" max="360" value="0">
            </div>

            <div class="pRange">
                <p id="filter-sepia" >sepia</p>
                <input type="range" name="" id="" min="0" max="100" value="0">
            </div>

            <div class="pRange">
                <p id="filter-brightness" >brightness</p>
                <input type="range" name="" id="" min="0" max="200" value="100">
            </div>

            <div class="pRange">
                <p id="filter-saturate" >saturate</p>
                <input type="range" name="" id=" "min="0" max="500" value="100">
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
